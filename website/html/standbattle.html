<script>
// ═══════════════════════════════════════════════
//  CANVAS + RESIZE
// ═══════════════════════════════════════════════
const canvas = document.getElementById('battleCanvas');
const ctx    = canvas.getContext('2d');

let W, H, B, groundY, spBase, twBase;

function resizeCanvas() {
    const wrap = document.querySelector('.canvas-wrapper');
    W = wrap.offsetWidth;
    H = wrap.offsetHeight;
    canvas.width  = W;
    canvas.height = H;
    ctx.imageSmoothingEnabled = false;
    B = Math.max(3, Math.floor(H / 42));
    groundY = Math.floor(H * 0.90);
    const sh = B * 28; // sprite height in px
    spBase = { x: Math.floor(W * 0.07),              y: groundY - sh };      // lower-left (back view)
    twBase = { x: Math.floor(W * 0.93) - B * 14,     y: Math.floor(H * 0.05) }; // upper-right (front view)
    drawFrame();
}
window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════
//  GAME DATA
// ═══════════════════════════════════════════════
const MAX_HP = 150;

const playerMoves = [
    { name: "ORA Barrage",    type: "Physical", min: 12, max: 22, acc: 1.00, heal: 0 },
    { name: "Prcsn Strike",   type: "Physical", min: 22, max: 38, acc: 1.00, heal: 0 },
    { name: "Star Finger",    type: "Special",  min: 35, max: 55, acc: 0.72, heal: 0 },
    { name: "Stand Resolve",  type: "Defense",  min:  0, max:  0, acc: 1.00, heal: 28 },
];
const enemyMoves = [
    { name: "ZA WARUDO",      type: "Special",  min: 25, max: 42, acc: 1.00, heal: 0 },
    { name: "Knife Volley",   type: "Physical", min: 14, max: 26, acc: 1.00, heal: 0 },
    { name: "Vampire Regen",  type: "Defense",  min:  0, max:  0, acc: 1.00, heal: 22 },
    { name: "ROAD ROLLER DA", type: "Special",  min: 40, max: 62, acc: 0.55, heal: 0 },
];

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let playerHp, enemyHp, busy;

// Animation state
let spDx = 0, spDy = 0, twDx = 0, twDy = 0;
let spArmExtend = 0, twArmExtend = 0;
let spFlashing = false, twFlashing = false;
let particles = [];

// ═══════════════════════════════════════════════
//  SPRITE DRAWING
// ═══════════════════════════════════════════════

// Star Platinum — 14w × 28h blocks, BACK VIEW (faces right toward TW)
function drawSP(x, y, armExtend) {
    const K='#111111', P='#6622aa', PD='#4a1577', BLU='#2244cc', DBL='#0f2299',
          LBL='#7799ee', G='#ffcc00', SK='#ffd9aa';
    const r = (c, rw, w, h, col) => {
        ctx.fillStyle = col;
        ctx.fillRect(x + c*B, y + rw*B, w*B, h*B);
    };

    // ── HAT (rows 0–4) — same silhouette from behind ──
    r(1, 0, 12, 4, P);
    r(0, 0,  1, 4, K);  r(13, 0,  1, 4, K);  r(1, 0, 12, 1, K);
    r(0, 4, 14, 1, G);   // gold brim
    r(0, 4,  1, 1, K);  r(13, 4,  1, 1, K);

    // ── BACK OF HEAD (rows 5–8) — hat continues down, no face ──
    r(3, 5, 8, 3, P);    // back of hat / cap extends
    r(3, 5, 1, 3, K);  r(10, 5, 1, 3, K);
    r(3, 5, 8, 1, K);   // outline top
    r(4, 7, 6, 1, PD);  // darker band at base of hat back
    r(4, 8, 6, 1, SK);  // nape of neck / skin showing below hat

    // ── NECK (rows 9–10) ──
    r(5,  9, 4, 2, SK);
    r(5,  9, 1, 2, K);  r(8,  9, 1, 2, K);

    // ── BACK COLLAR (row 11) — gold collar visible from behind ──
    r(4, 11, 6, 1, G);
    r(4, 11, 1, 1, K);  r(9, 11, 1, 1, K);

    // ── SHOULDER LINE (row 12) ──
    r(0, 12, 14, 1, K);
    r(1, 12, 12, 1, LBL);

    // ── BACK BODY (rows 13–19) — back armor, no chest star ──
    r(1, 13, 12, 7, BLU);
    r(0, 13,  1, 7, K);  r(13, 13,  1, 7, K);  r(1, 19, 12, 1, K);
    // Purple cape panels on either side of back
    r(2, 13, 2, 7, P);
    r(10, 13, 2, 7, P);
    // Darker center back armor panel
    r(4, 13, 6, 7, DBL);
    // Spine detail line
    r(6, 14, 2, 5, BLU);

    // ── LEFT ARM (hanging, cols 0–1) ──
    r(0, 12, 2, 9, K);
    r(0, 13, 1, 8, DBL);

    // ── RIGHT ARM + FIST (punching right toward TW) ──
    const ae = Math.round(armExtend * 5);
    r(12, 12, 2, 4, K);
    r(12, 13, 1, 3, DBL);
    r(12 + ae, 16, 3, 3, K);
    r(12 + ae + 1, 16, 2, 3, G);

    // ── BELT (row 20) ──
    r(2, 20, 10, 1, G);
    r(1, 20, 1, 1, K);  r(12, 20, 1, 1, K);

    // ── HIPS (rows 21–22) ──
    r(2, 21, 10, 2, BLU);
    r(2, 21, 10, 1, K);
    r(1, 21, 1, 2, K);  r(12, 21, 1, 2, K);
    r(2, 22, 10, 1, K);

    // ── LEGS (rows 23–25) ──
    r(2, 23, 4, 3, K);  r(3, 23, 2, 3, BLU);
    r(8, 23, 4, 3, K);  r(9, 23, 2, 3, BLU);

    // ── BOOTS (rows 26–27) ──
    r(1, 26, 5, 2, K);  r(2, 26, 3, 2, G);
    r(8, 26, 5, 2, K);  r(9, 26, 3, 2, G);
}

// The World — same 14w × 28h grid, gold/orange, drawn MIRRORED (faces left)
function drawTW(x, y, armExtend) {
    ctx.save();
    ctx.translate(x + 14 * B, y);
    ctx.scale(-1, 1);

    const K='#111111', Y='#bb8800', YEL='#eecc11', DYL='#886600',
          LYL='#ffee66', ORG='#ff7700', SK='#ffd9aa', EY='#441100';
    const r = (c, rw, w, h, col) => {
        ctx.fillStyle = col;
        ctx.fillRect(c*B, rw*B, w*B, h*B);
    };

    // ── HAT (rows 0–4) — DIO crown style ──
    r(1, 0, 12, 4, Y);
    r(0, 0,  1, 4, K);  r(13, 0,  1, 4, K);  r(1, 0, 12, 1, K);
    // Crown notches
    r(2, 0,  2, 1, K);  r(10, 0,  2, 1, K);
    r(5, 0,  4, 1, ORG);  // orange crown top
    r(0, 4, 14, 1, K);  // black brim

    // ── FACE (rows 5–9) ──
    r(3, 5, 8, 5, SK);
    r(3, 5, 1, 5, K);  r(10, 5, 1, 5, K);
    r(3, 5, 8, 1, K);  r(3, 9, 8, 1, K);
    r(5, 6, 2, 2, EY);
    r(8, 6, 2, 2, EY);
    r(6, 8, 3, 1, '#ddbba0');  // DIO smirk

    // ── NECK / COLLAR (rows 10–11) ──
    r(5, 10, 4, 1, SK);
    r(5, 10, 1, 1, K);  r(8, 10, 1, 1, K);
    r(4, 11, 6, 1, ORG);
    r(4, 11, 1, 1, K);  r(9, 11, 1, 1, K);

    // ── SHOULDER LINE (row 12) ──
    r(0, 12, 14, 1, K);
    r(1, 12, 12, 1, LYL);

    // ── BODY (rows 13–19) ──
    r(1, 13, 12, 7, YEL);
    r(0, 13,  1, 7, K);  r(13, 13,  1, 7, K);  r(1, 19, 12, 1, K);

    // Orange cross on chest
    r(6, 13, 2, 7, ORG);
    r(3, 16, 8, 2, ORG);

    // ── LEFT ARM (hanging) ──
    r(0, 12, 2, 9, K);
    r(0, 13, 1, 8, DYL);

    // ── RIGHT ARM + FIST ──
    const ae = Math.round(armExtend * 5);
    r(12, 12, 2, 4, K);
    r(12, 13, 1, 3, DYL);
    r(12 + ae, 16, 3, 3, K);
    r(12 + ae + 1, 16, 2, 3, ORG);

    // ── BELT (row 20) ──
    r(2, 20, 10, 1, ORG);
    r(1, 20, 1, 1, K);  r(12, 20, 1, 1, K);

    // ── HIPS (rows 21–22) ──
    r(2, 21, 10, 2, YEL);
    r(2, 21, 10, 1, K);
    r(1, 21, 1, 2, K);  r(12, 21, 1, 2, K);
    r(2, 22, 10, 1, K);

    // ── LEGS (rows 23–25) ──
    r(2, 23, 4, 3, K);  r(3, 23, 2, 3, YEL);
    r(8, 23, 4, 3, K);  r(9, 23, 2, 3, YEL);

    // ── BOOTS (rows 26–27) ──
    r(1, 26, 5, 2, K);  r(2, 26, 3, 2, ORG);
    r(8, 26, 5, 2, K);  r(9, 26, 3, 2, ORG);

    ctx.restore();
}

// ═══════════════════════════════════════════════
//  BACKGROUND
// ═══════════════════════════════════════════════
function drawBackground() {
    // Full-canvas sky gradient (no ground)
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0,   '#1a1850');
    sky.addColorStop(0.5, '#2e3a99');
    sky.addColorStop(1,   '#5566cc');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Menacing ゴ text scattered across the scene
    ctx.save();
    ctx.font = `bold ${Math.max(10, B * 3)}px 'Courier New', monospace`;
    const goPos = [
        [0.06,0.06],[0.22,0.03],[0.40,0.10],[0.56,0.03],[0.72,0.08],[0.88,0.05],
        [0.14,0.32],[0.33,0.26],[0.52,0.34],[0.70,0.28],[0.87,0.36],[0.02,0.55],
        [0.92,0.54]
    ];
    goPos.forEach(([px, py], i) => {
        const alpha = 0.10 + (i % 3) * 0.05;
        ctx.fillStyle = `rgba(200, 80, 255, ${alpha})`;
        ctx.fillText('ゴ', W * px, H * py);
    });
    ctx.restore();
}

// ═══════════════════════════════════════════════
//  HP CARDS  (drawn on canvas)
// ═══════════════════════════════════════════════
function drawHpCard(cx, cy, who) {
    const hp  = who === 'player' ? playerHp : enemyHp;
    const pct = Math.max(0, hp / MAX_HP);
    const trainer = who === 'player' ? 'JOTARO'       : 'Foe: DIO';
    const stand   = who === 'player' ? 'STAR PLATINUM' : 'THE WORLD';

    const cW = Math.floor(B * 22);
    const cH = Math.floor(B * 7.5);
    const bdr = Math.max(2, Math.floor(B * 0.35));

    ctx.fillStyle = '#000';
    ctx.fillRect(cx + 3, cy + 3, cW, cH);

    ctx.fillStyle = '#f6e41f';
    ctx.fillRect(cx, cy, cW, cH);

    ctx.strokeStyle = '#000';
    ctx.lineWidth = bdr;
    ctx.strokeRect(cx + bdr * 0.5, cy + bdr * 0.5, cW - bdr, cH - bdr);

    const fs1 = Math.max(9,  Math.floor(B * 1.1));
    const fs2 = Math.max(10, Math.floor(B * 1.45));
    const pad = B * 0.6;

    ctx.textAlign = 'left';
    ctx.fillStyle = '#555';
    ctx.font = `${fs1}px 'Courier New', monospace`;
    ctx.fillText(trainer, cx + pad, cy + B * 1.6);

    ctx.fillStyle = '#000';
    ctx.font = `bold ${fs2}px 'Courier New', monospace`;
    ctx.fillText(stand, cx + pad, cy + B * 3.2);

    ctx.font = `bold ${fs1}px 'Courier New', monospace`;
    ctx.fillText('HP', cx + pad, cy + B * 4.7);

    const barX = cx + B * 3.0;
    const barY = cy + B * 3.9;
    const barW = cW - B * 3.6;
    const barH = Math.max(6, Math.floor(B * 1.1));

    ctx.fillStyle = '#777';
    ctx.fillRect(barX, barY, barW, barH);

    const fc = pct > 0.5 ? '#00cc00' : pct > 0.25 ? '#ffcc00' : '#ee2200';
    ctx.fillStyle = fc;
    ctx.fillRect(barX + 1, barY + 1, Math.max(0, (barW - 2) * pct), Math.max(0, barH - 2));

    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    ctx.fillStyle = '#000';
    ctx.font = `${Math.max(8, Math.floor(B * 0.95))}px 'Courier New', monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(Math.max(0, hp) + '/' + MAX_HP, cx + cW - B * 0.4, cy + cH - B * 0.5);
    ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
function spawnParticles(cx, cy) {
    const colors = ['#ffcc00', '#ff8800', '#ffffff', '#ff4400', '#ffee66'];
    for (let i = 0; i < 14; i++) {
        const angle = (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
        const speed = 1.5 + Math.random() * 4.5;
        particles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1.5,
            life: 0, maxLife: 18 + Math.floor(Math.random() * 8),
            size: B * 0.9 + Math.random() * B * 1.2,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }
}

function drawParticles() {
    particles = particles.filter(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.2;
        p.life++;
        const t = p.life / p.maxLife;
        ctx.globalAlpha = (1 - t) * 0.95;
        ctx.fillStyle = p.color;
        const sz = Math.max(1, p.size * (1 - t * 0.4));
        ctx.fillRect(p.x - sz * 0.5, p.y - sz * 0.5, sz, sz);
        return p.life < p.maxLife;
    });
    ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
//  DRAW FRAME
// ═══════════════════════════════════════════════
function drawFrame() {
    if (!W) return;
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, W, H);

    drawBackground();

    // TW (enemy) with flash
    if (twFlashing) ctx.globalAlpha = 0.12;
    drawTW(twBase.x + twDx, twBase.y + twDy, twArmExtend);
    ctx.globalAlpha = 1;

    // SP (player) with flash
    if (spFlashing) ctx.globalAlpha = 0.12;
    drawSP(spBase.x + spDx, spBase.y + spDy, spArmExtend);
    ctx.globalAlpha = 1;

    drawParticles();

    // HP cards — pinned to opposite corners from each character
    const cardW = Math.floor(B * 22);
    const cardH = Math.floor(B * 7.5);
    drawHpCard(10, 10, 'enemy');                              // top-left (TW is top-right)
    drawHpCard(W - cardW - 10, H - cardH - 10, 'player');    // bottom-right (SP is bottom-left)
}

// ═══════════════════════════════════════════════
//  ATTACK ANIMATION
// ═══════════════════════════════════════════════
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeIn(t)  { return t * t; }

function animateAttack(attacker, onHit) {
    return new Promise(resolve => {
        let frame = 0, hitDone = false;
        const LUNGE = 14, PAUSE = 4, RETURN = 16, TOTAL = 34;
        const lungeMax = Math.floor(W * 0.26);

        function tick() {
            frame++;

            // Diagonal offset: SP angles up toward TW (upper-right), TW angles down toward SP
            const yFrac = 0.18; // vertical component as fraction of horizontal lunge

            if (frame <= LUNGE) {
                const t = easeOut(frame / LUNGE);
                if (attacker === 'player') {
                    spDx = t * lungeMax; spDy = -t * lungeMax * yFrac;
                    spArmExtend = frame / LUNGE;
                } else {
                    twDx = -t * lungeMax; twDy = t * lungeMax * yFrac;
                    twArmExtend = frame / LUNGE;
                }

            } else if (frame <= LUNGE + PAUSE) {
                if (!hitDone) {
                    hitDone = true;
                    onHit();
                    const hx = attacker === 'player'
                        ? twBase.x + twDx + B * 7
                        : spBase.x + spDx + B * 7;
                    const hy = (attacker === 'player' ? twBase.y + twDy : spBase.y + spDy) + B * 14;
                    spawnParticles(hx, hy);
                    if (attacker === 'player') twFlashing = true;
                    else                       spFlashing = true;
                }

            } else if (frame <= TOTAL) {
                const t = easeIn((frame - LUNGE - PAUSE) / RETURN);
                const rt = 1 - (frame - LUNGE - PAUSE) / RETURN;
                if (attacker === 'player') {
                    spDx = lungeMax * (1 - t); spDy = -lungeMax * yFrac * (1 - t);
                    spArmExtend = rt;
                    if (frame % 3 === 0) twFlashing = !twFlashing;
                } else {
                    twDx = -lungeMax * (1 - t); twDy = lungeMax * yFrac * (1 - t);
                    twArmExtend = rt;
                    if (frame % 3 === 0) spFlashing = !spFlashing;
                }

            } else {
                spDx = spDy = twDx = twDy = spArmExtend = twArmExtend = 0;
                spFlashing = twFlashing = false;
                particles = [];
                drawFrame();
                resolve();
                return;
            }

            drawFrame();
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    });
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function initGame() {
    playerHp = MAX_HP;
    enemyHp  = MAX_HP;
    busy = false;
    spDx = spDy = twDx = twDy = spArmExtend = twArmExtend = 0;
    spFlashing = twFlashing = false;
    particles = [];
    document.getElementById('resultOverlay').classList.remove('show');
    renderMoves();
    setText("What will<br>STAR PLATINUM do?");
    setMovesEnabled(true);
    drawFrame();
}

function setText(html) { document.getElementById('battleText').innerHTML = html; }

function renderMoves() {
    const menu = document.getElementById('moveMenu');
    menu.innerHTML = '';
    playerMoves.forEach((m, i) => {
        const btn = document.createElement('button');
        btn.className = 'move-btn';
        btn.innerHTML = m.name + '<span class="move-type">' + m.type + '</span>';
        btn.onclick = () => playerTurn(i);
        menu.appendChild(btn);
    });
}

function setMovesEnabled(on) {
    document.querySelectorAll('.move-btn').forEach(b => b.disabled = !on);
}

function rollDmg(m) {
    if (Math.random() > m.acc) return null;
    return Math.floor(Math.random() * (m.max - m.min + 1)) + m.min;
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function playerTurn(idx) {
    if (busy) return;
    busy = true;
    setMovesEnabled(false);

    const move = playerMoves[idx];

    if (move.heal > 0) {
        const got = Math.min(move.heal, MAX_HP - playerHp);
        playerHp = Math.min(MAX_HP, playerHp + move.heal);
        setText("STAR PLATINUM used<br><b>" + move.name + "</b>!<br>Restored " + got + " HP!");
        drawFrame();
        await wait(1000);
    } else {
        const dmg = rollDmg(move);
        if (dmg === null) {
            setText("STAR PLATINUM used<br><b>" + move.name + "</b>!<br>But it missed!");
            await wait(1000);
        } else {
            setText("STAR PLATINUM used<br><b>" + move.name + "</b>!");
            await wait(180);
            await animateAttack('player', () => { enemyHp = Math.max(0, enemyHp - dmg); });
            setText("STAR PLATINUM used<br><b>" + move.name + "</b>!<br>Dealt <b>" + dmg + "</b> damage!");
            await wait(950);
        }
    }

    if (enemyHp <= 0) { endGame(true); return; }
    await enemyTurn();
}

async function enemyTurn() {
    const hpR = enemyHp / MAX_HP;
    let wt = [30, 30, 10, 20];
    if (hpR < 0.30) wt[2] = 45;

    const total = wt.reduce((a,b) => a+b, 0);
    let rv = Math.random() * total, idx = 0;
    for (let i = 0; i < wt.length; i++) { rv -= wt[i]; if (rv <= 0) { idx = i; break; } }

    const move = enemyMoves[idx];
    setText("THE WORLD used<br><b>" + move.name + "</b>!");
    await wait(600);

    if (move.heal > 0) {
        const got = Math.min(move.heal, MAX_HP - enemyHp);
        enemyHp = Math.min(MAX_HP, enemyHp + move.heal);
        drawFrame();
        setText("THE WORLD used<br><b>" + move.name + "</b>!<br>DIO restored " + got + " HP!");
        await wait(1000);
    } else {
        const dmg = rollDmg(move);
        if (dmg === null) {
            setText("THE WORLD used<br><b>" + move.name + "</b>!<br>But it missed!");
            await wait(1000);
        } else {
            await animateAttack('enemy', () => { playerHp = Math.max(0, playerHp - dmg); });
            setText("THE WORLD used<br><b>" + move.name + "</b>!<br>Dealt <b>" + dmg + "</b> damage!");
            await wait(950);
        }
    }

    if (playerHp <= 0) { endGame(false); return; }
    setText("What will<br>STAR PLATINUM do?");
    setMovesEnabled(true);
    busy = false;
}

function endGame(playerWon) {
    const main = document.getElementById('resultMain');
    const sub  = document.getElementById('resultSub');
    if (playerWon) {
        main.textContent = "YARE YARE DAZE";
        main.style.color = '#f6e41f';
        sub.textContent  = "Star Platinum wins! DIO is defeated!";
    } else {
        main.textContent = "ZA WARUDO!";
        main.style.color = 'lightcoral';
        sub.textContent  = "Star Platinum fainted... Muda muda muda!";
    }
    document.getElementById('resultOverlay').classList.add('show');
}

// ═══════════════════════════════════════════════
//  MENU + INIT
// ═══════════════════════════════════════════════
document.addEventListener('click', e => {
    const menu = document.querySelector('.leftmenu');
    const btn  = document.querySelector('.menu-btn');
    if (menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target))
        menu.classList.remove('open');
});

// Wait for layout to settle, then init
requestAnimationFrame(() => {
    resizeCanvas();
    initGame();
});
</script>
